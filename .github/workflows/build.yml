name: Build 360Launcher

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone Flarial dll-oss base
        run: git clone https://github.com/flarialmc/dll-oss.git dll
        shell: bash

      - name: Install GLM (needed for rendering)
        run: git clone https://github.com/g-truc/glm.git dll/external/glm
        shell: bash

      - name: Clone Flarial launcher base
        run: git clone https://github.com/flarialmc/launcher.git launcher-base
        shell: bash

      - name: Overlay launcher files
        shell: pwsh
        run: |
          $dst = "launcher-base/src/Flarial.Launcher"
          New-Item -Force -ItemType Directory "$dst/Runtime" | Out-Null
          Copy-Item -Force "Launcher360.cs" "$dst/Launcher360.cs"
          Copy-Item -Force "Flarial.Launcher.csproj" "$dst/Flarial.Launcher.csproj"

      - name: Overlay client files
        shell: pwsh
        run: |
          $base = "dll/src"

          Copy-Item -Force "360Client.hpp" "$base/Client/GUI/Engine/360Client.hpp"

          $mod = "$base/Client/Module/Modules"
          New-Item -Force -ItemType Directory "$mod/RenderOptions" | Out-Null
          New-Item -Force -ItemType Directory "$mod/Fullbright" | Out-Null
          New-Item -Force -ItemType Directory "$mod/EntityCuller" | Out-Null
          New-Item -Force -ItemType Directory "$mod/RenderOptimizer" | Out-Null

          Copy-Item -Force "360Client.cpp" "$mod/360Client_All.cpp"

      - name: Patch fmt branch in CMakeLists
        shell: pwsh
        run: |
          $f = "dll/CMakeLists.txt"
          $c = Get-Content $f -Raw
          $c = $c -replace 'GIT_TAG\s+master', 'GIT_TAG origin/main'
          Set-Content $f $c

      - name: Patch EngineCore.hpp
        shell: pwsh
        run: |
          $f = "dll/src/Client/GUI/Engine/EngineCore.hpp"
          $c = Get-Content $f -Raw
          if ($c -notmatch "360Client.hpp") {
            $c = "#include `"360Client.hpp`"`n" + $c
            Set-Content $f $c
          }

      - name: Register modules
        shell: pwsh
        run: |
          $f = "dll/src/Client/Module/Manager.cpp"
          $c = Get-Content $f -Raw

          $inc = '#include "Modules/360Client_All.cpp"'
          $reg = "modules.push_back(new RenderOptions());`nmodules.push_back(new Fullbright());`nmodules.push_back(new EntityCuller());`nmodules.push_back(new RenderOptimizer());"

          if ($c -notmatch "360Client_All") {
            $c = $inc + "`n" + $c
            $match = [regex]::Match($c, 'modules\.push_back\(new')
            if ($match.Success) {
              $index = $match.Index
              $c = $c.Insert($index, "$reg`n")
            }
            Set-Content $f $c
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build DLL (WITH GLM)
        shell: pwsh
        run: |
          $glmPath = Resolve-Path "dll/external/glm"

          cmake -B dll/build -S dll `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_CXX_STANDARD=17 `
            -DCMAKE_CXX_FLAGS="/I$glmPath"

          cmake --build dll/build --config Release

      - name: Embed DLL
        shell: pwsh
        run: |
          $dll = Get-ChildItem "dll/build/Release" -Filter "*.dll" | Select-Object -First 1
          if (!$dll) { Write-Error "DLL not found!"; exit 1 }

          $res = "launcher-base/src/Flarial.Launcher/Resources"
          New-Item -Force -ItemType Directory $res | Out-Null

          Copy-Item -Force $dll.FullName "$res/360Client.dll"
          Set-Content "$res/360Client.version.txt" "${{ github.ref_name }}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      - name: Build EXE
        shell: pwsh
        run: |
          dotnet publish launcher-base/src/Flarial.Launcher/Flarial.Launcher.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            -o out

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "360Launcher ${{ github.ref_name }}"
          files: out/360Launcher.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
