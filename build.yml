name: Build 360Launcher

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Clone base repos
      - name: Clone DLL base
        run: git clone https://github.com/flarialmc/dll-oss.git dll

      - name: Clone launcher base
        run: git clone https://github.com/flarialmc/launcher.git launcher-base

      # Inject module registration safely
      - name: Patch Module Manager
        shell: pwsh
        run: |
          $file = "dll/src/Client/Module/Manager.cpp"
          $c = Get-Content $file -Raw

          # Your module registration line (adjust if needed)
          $reg = 'modules.push_back(new RenderOptions()); modules.push_back(new Fullbright());'

          # Insert BEFORE first occurrence of modules.push_back(new ...)
          $match = [regex]::Match($c, 'modules\.push_back\(new')
          if ($match.Success) {
              $index = $match.Index
              $c = $c.Insert($index, "$reg`n")
          }

          Set-Content $file $c

      # Build DLL 
      - name: Build DLL
        run: |
          cd dll
          mkdir build
          cd build
          cmake ..
          cmake --build . --config Release

      # Copy DLL into launcher resources
      - name: Copy DLL to Launcher
        shell: pwsh
        run: |
          Copy-Item "dll/build/Release/*.dll" "launcher-base/src/Flarial.Launcher/Resources/360Client.dll" -Force

      # Build launcher
      - name: Build Launcher
        run: |
          cd launcher-base/src/Flarial.Launcher
          dotnet build -c Release

      # Upload artifact
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: 360Client
          path: launcher-base/src/Flarial.Launcher/bin/Release/**/*
